<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoGuesser | Login</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="login-body">
    <main class="login-shell">
      <section class="login-card">
        <h1>GeoGuesser</h1>
        <p class="subtitle">Sign in to play modes, track scores, and climb the leaderboard.</p>

        <label>
          Username
          <input id="usernameInput" type="text" placeholder="joey" />
        </label>

        <label>
          Password
          <input id="passwordInput" type="password" placeholder="••••••••" />
        </label>

        <div class="login-actions">
          <button id="signInBtn">Sign In</button>
          <button id="registerBtn" class="ghost-btn">Register</button>
        </div>

        <p id="authStatus">Use a new username to register.</p>
      </section>
    </main>

    <script src="./login.js"></script>
  </body>
</html>
