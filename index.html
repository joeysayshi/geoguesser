<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoGuesser Country Mode</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <section class="viewer-wrap">
        <iframe
          id="streetView"
          title="Street view"
          referrerpolicy="no-referrer-when-downgrade"
          allowfullscreen
          loading="eager"
        ></iframe>

        <div class="hud">
          <div class="hud-box"><span>ROUND</span><strong id="roundLabel">1/5</strong></div>
          <div class="hud-box"><span>SCORE</span><strong id="scoreLabel">0</strong></div>
          <div class="hud-box"><span>TIMER</span><strong id="timerLabel">45s</strong></div>
        </div>

        <div class="clue-card">
          <div class="clue-head">Clues</div>
          <ul id="clueList"></ul>
          <button id="clueBtn" class="subtle-btn">Reveal Clue</button>
          <p id="penaltyLabel">Clue penalty: 0%</p>
        </div>

        <div class="map-overlay">
          <div class="map-toolbar">
            <span>Guess Map</span>
            <button id="recenterBtn" class="ghost-btn">Recenter</button>
          </div>
          <div id="map"></div>
          <div class="map-actions">
            <button id="clearGuessBtn" class="ghost-btn" disabled>Clear Pin</button>
            <button id="guessBtn" disabled>GUESS</button>
          </div>
        </div>

        <div class="control-dock">
          <p id="statusLabel">Look around, then click your country on the mini map.</p>
          <div class="dock-right">
            <div class="progress-track" aria-hidden="true">
              <div id="roundProgress" class="progress-fill"></div>
            </div>
            <button id="restartBtn" hidden>PLAY AGAIN</button>
          </div>
        </div>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
